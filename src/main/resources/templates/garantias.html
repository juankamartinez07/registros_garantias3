<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Garantias en tramite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background:#eef2f7;
        }

        .page-shell{
            max-width:1180px;
            margin:0 auto;
            padding:28px 16px 48px;
        }

        .toolbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            flex-wrap:wrap;
            margin-bottom:22px;
        }

        .panel{
            background:#fff;
            border:1px solid #e5e7eb;
            border-radius:8px;
            box-shadow:0 10px 26px rgba(15,23,42,0.08);
            padding:22px;
            margin-bottom:20px;
        }

        .estado-pill{
            display:inline-flex;
            align-items:center;
            border-radius:999px;
            padding:4px 10px;
            font-size:12px;
            font-weight:800;
            background:#dbeafe;
            color:#1d4ed8;
        }

        .toast-sistema{
            position:fixed;
            top:22px;
            right:22px;
            z-index:1000;
            min-width:280px;
            max-width:460px;
            display:none;
        }

        .toast-sistema.visible{
            display:block;
        }

        textarea{
            resize:vertical;
        }
    </style>
</head>

<body>

<div class="page-shell">

    <div class="toolbar">
        <div>
            <h1 class="h3 mb-1">Garantias en tramite</h1>
            <div class="text-muted">Registro y seguimiento de procesos de garantia por serial.</div>
        </div>

        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary">Volver</a>
            <button class="btn btn-primary" onclick="limpiarFormulario()">Nueva garantia</button>
        </div>
    </div>

    <div id="mensajeInicial" class="alert alert-info" style="display:none;"></div>

    <div class="panel">
        <h2 class="h5 mb-3">Formulario de garantia</h2>

        <form id="formGarantia" onsubmit="guardarGarantia(event)">
            <input type="hidden" id="garantiaId">
            <input type="hidden" id="equipoId">

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label"># de ticket</label>
                    <input id="numeroTicket" class="form-control" readonly placeholder="Se genera al guardar">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Serial</label>
                    <div class="input-group">
                        <input id="serial" class="form-control" required>
                        <button type="button" class="btn btn-outline-primary" onclick="prepararGarantiaDesdeSerial()">Buscar</button>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Sede</label>
                    <input id="sede" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Referencia / Producto</label>
                    <input id="referenciaProducto" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Proveedor</label>
                    <input id="proveedor" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Factura proveedor</label>
                    <input id="facturaProveedor" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Numero caso proveedor</label>
                    <input id="numeroCasoProveedor" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Fecha ingreso garantia</label>
                    <input id="fechaIngresoGarantia" type="date" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Fecha ingreso serial</label>
                    <input id="fechaIngresoSerial" type="date" class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Estado</label>
                    <select id="estado" class="form-select" onchange="actualizarMotivoNoAplica()">
                        <option>En tramite</option>
                        <option>Reparado</option>
                        <option>No aplico garantia</option>
                        <option>Cambio por equipo nuevo</option>
                        <option>Nota credito</option>
                    </select>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Motivos garantia</label>
                    <textarea id="motivosGarantia" class="form-control" rows="3" required></textarea>
                </div>

                <div id="grupoMotivoNoAplica" class="col-md-12 mb-3" style="display:none;">
                    <label class="form-label">Motivo no aplica garantia</label>
                    <textarea id="motivoNoAplicaGarantia" class="form-control" rows="3"></textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-outline-secondary" onclick="limpiarFormulario()">Limpiar</button>
                <button class="btn btn-success">Guardar garantia</button>
            </div>
        </form>
    </div>

    <div class="panel">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
            <h2 class="h5 mb-0">Listado de garantias</h2>

            <div class="d-flex gap-2 flex-wrap">
                <input id="filtroSerial" class="form-control" style="max-width:220px;" placeholder="Buscar serial o ticket">
                <select id="filtroEstado" class="form-select" style="max-width:220px;">
                    <option value="">Todos los estados</option>
                    <option>En tramite</option>
                    <option>Reparado</option>
                    <option>No aplico garantia</option>
                    <option>Cambio por equipo nuevo</option>
                    <option>Nota credito</option>
                </select>
                <button class="btn btn-primary" onclick="filtrarGarantias()">Buscar</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th># Ticket</th>
                        <th>Serial</th>
                        <th>Producto</th>
                        <th>Proveedor</th>
                        <th>Estado</th>
                        <th>Fecha garantia</th>
                        <th>Caso proveedor</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaGarantias"></tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div id="estadoPaginacion" class="text-muted fw-bold">Cargando garantias...</div>
            <div class="d-flex gap-2">
                <button id="btnAnterior" class="btn btn-outline-primary btn-sm" onclick="cambiarPagina(-1)">Anterior</button>
                <button id="btnSiguiente" class="btn btn-primary btn-sm" onclick="cambiarPagina(1)">Siguiente</button>
            </div>
        </div>
    </div>

</div>

<div id="toastSistema" class="toast-sistema alert alert-info shadow"></div>

<script>
const ESTADOS_API = {
    "En tramite":"En trámite",
    "Reparado":"Reparado",
    "No aplico garantia":"No aplicó garantía",
    "Cambio por equipo nuevo":"Cambio por equipo nuevo",
    "Nota credito":"Nota crédito"
};

const ESTADOS_UI = Object.fromEntries(
    Object.entries(ESTADOS_API).map(([ui, api]) => [api, ui])
);

let paginaActual = 0;
let totalPaginas = 0;
let temporizadorToast = null;

window.onload = function(){
    document.getElementById("fechaIngresoGarantia").value = new Date().toISOString().slice(0, 10);

    const params = new URLSearchParams(window.location.search);
    const serial = params.get("serial");
    if(serial){
        document.getElementById("serial").value = serial;
        prepararGarantiaDesdeSerial();
    }

    listarGarantias();
};

function mostrarToast(mensaje, tipo = "info"){
    const toast = document.getElementById("toastSistema");
    clearTimeout(temporizadorToast);
    toast.className = `toast-sistema alert alert-${tipo} shadow visible`;
    toast.innerText = mensaje;
    temporizadorToast = setTimeout(() => toast.classList.remove("visible"), 5500);
}

function escaparHtml(valor){
    return String(valor ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function estadoApiDesdeSelect(id){
    return ESTADOS_API[document.getElementById(id).value] || document.getElementById(id).value;
}

function estadoUiDesdeApi(estado){
    return ESTADOS_UI[estado] || estado || "En tramite";
}

function prepararGarantiaDesdeSerial(){
    const serial = document.getElementById("serial").value.trim();
    if(serial === ""){
        mostrarToast("Ingrese un serial para preparar la garantia.", "warning");
        return;
    }

    fetch(`/garantias/api/preparar?serial=${encodeURIComponent(serial)}`)
        .then(async response => {
            if(!response.ok){
                const mensaje = await response.text();
                throw new Error(mensaje || "No se pudo preparar la garantia.");
            }
            return response.json();
        })
        .then(data => {
            llenarFormulario(data);
            document.getElementById("mensajeInicial").style.display = "none";
            mostrarToast("Datos del serial cargados para garantia.", "success");
        })
        .catch(error => {
            mostrarToast(error.message, "danger");
            const mensaje = document.getElementById("mensajeInicial");
            mensaje.className = "alert alert-warning";
            mensaje.style.display = "block";
            mensaje.innerText = error.message;
        });
}

function llenarFormulario(data){
    document.getElementById("garantiaId").value = data.id || "";
    document.getElementById("equipoId").value = data.equipoId || data.equipo?.id_equipo || "";
    document.getElementById("numeroTicket").value = data.numeroTicket || "";
    document.getElementById("sede").value = data.sede || "";
    document.getElementById("referenciaProducto").value = data.referenciaProducto || "";
    document.getElementById("serial").value = data.serial || "";
    document.getElementById("estado").value = estadoUiDesdeApi(data.estado);
    document.getElementById("proveedor").value = data.proveedor || "";
    document.getElementById("facturaProveedor").value = data.facturaProveedor || "";
    document.getElementById("fechaIngresoGarantia").value = data.fechaIngresoGarantia || new Date().toISOString().slice(0, 10);
    document.getElementById("fechaIngresoSerial").value = data.fechaIngresoSerial || "";
    document.getElementById("motivosGarantia").value = data.motivosGarantia || "";
    document.getElementById("numeroCasoProveedor").value = data.numeroCasoProveedor || "";
    document.getElementById("motivoNoAplicaGarantia").value = data.motivoNoAplicaGarantia || "";
    actualizarMotivoNoAplica();
}

function datosFormulario(){
    return {
        id: document.getElementById("garantiaId").value || null,
        equipoId: document.getElementById("equipoId").value || null,
        numeroTicket: document.getElementById("numeroTicket").value || null,
        sede: document.getElementById("sede").value,
        referenciaProducto: document.getElementById("referenciaProducto").value,
        serial: document.getElementById("serial").value,
        estado: estadoApiDesdeSelect("estado"),
        proveedor: document.getElementById("proveedor").value,
        facturaProveedor: document.getElementById("facturaProveedor").value,
        fechaIngresoGarantia: document.getElementById("fechaIngresoGarantia").value || null,
        fechaIngresoSerial: document.getElementById("fechaIngresoSerial").value || null,
        motivosGarantia: document.getElementById("motivosGarantia").value,
        numeroCasoProveedor: document.getElementById("numeroCasoProveedor").value,
        motivoNoAplicaGarantia: document.getElementById("motivoNoAplicaGarantia").value
    };
}

function guardarGarantia(event){
    event.preventDefault();

    const id = document.getElementById("garantiaId").value;
    const metodo = id ? "PUT" : "POST";
    const url = id ? `/garantias/api/${id}` : "/garantias/api";

    fetch(url, {
        method: metodo,
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(datosFormulario())
    })
        .then(async response => {
            if(!response.ok){
                const mensaje = await response.text();
                throw new Error(mensaje || "No se pudo guardar la garantia.");
            }
            return response.json();
        })
        .then(() => {
            mostrarToast("Garantia guardada correctamente.", "success");
            limpiarFormulario();
            listarGarantias();
        })
        .catch(error => mostrarToast(error.message, "danger"));
}

function editarGarantia(id){
    fetch(`/garantias/api/${id}`)
        .then(response => response.json())
        .then(data => {
            const dto = {
                id: data.id,
                equipoId: data.equipo?.id_equipo,
                numeroTicket: data.numeroTicket,
                sede: data.sede,
                referenciaProducto: data.referenciaProducto,
                serial: data.serial,
                estado: data.estado,
                proveedor: data.proveedor,
                facturaProveedor: data.facturaProveedor,
                fechaIngresoGarantia: data.fechaIngresoGarantia,
                fechaIngresoSerial: data.fechaIngresoSerial,
                motivosGarantia: data.motivosGarantia,
                numeroCasoProveedor: data.numeroCasoProveedor,
                motivoNoAplicaGarantia: data.motivoNoAplicaGarantia
            };
            llenarFormulario(dto);
            window.scrollTo({top:0, behavior:"smooth"});
        });
}

function listarGarantias(){
    const params = new URLSearchParams({
        page: paginaActual,
        size: 10
    });

    const serial = document.getElementById("filtroSerial").value.trim();
    const estado = document.getElementById("filtroEstado").value;

    if(serial !== ""){
        params.append("serial", serial);
    }

    if(estado !== ""){
        params.append("estado", ESTADOS_API[estado] || estado);
    }

    fetch(`/garantias/api?${params.toString()}`)
        .then(response => response.json())
        .then(pagina => {
            const garantias = pagina.content || [];
            totalPaginas = pagina.totalPages || 0;

            document.getElementById("tablaGarantias").innerHTML =
                garantias.map(g => `
                    <tr>
                        <td class="fw-bold">${escaparHtml(g.numeroTicket || "")}</td>
                        <td>${escaparHtml(g.serial)}</td>
                        <td>${escaparHtml(g.referenciaProducto)}</td>
                        <td>${escaparHtml(g.proveedor)}</td>
                        <td><span class="estado-pill">${escaparHtml(g.estado)}</span></td>
                        <td>${escaparHtml(g.fechaIngresoGarantia || "")}</td>
                        <td>${escaparHtml(g.numeroCasoProveedor || "")}</td>
                        <td>
                            <button class="btn btn-warning btn-sm" onclick="editarGarantia(${g.id})">
                                Editar
                            </button>
                        </td>
                    </tr>
                `).join("");

            document.getElementById("estadoPaginacion").innerText =
                garantias.length === 0
                    ? "No hay garantias para mostrar."
                    : `Pagina ${(pagina.number || 0) + 1} de ${totalPaginas || 1} - ${pagina.totalElements || garantias.length} garantias`;

            document.getElementById("btnAnterior").disabled = paginaActual <= 0;
            document.getElementById("btnSiguiente").disabled = totalPaginas <= 1 || paginaActual >= totalPaginas - 1;
        })
        .catch(() => mostrarToast("No se pudo cargar el listado de garantias.", "danger"));
}

function filtrarGarantias(){
    paginaActual = 0;
    listarGarantias();
}

function cambiarPagina(cambio){
    const siguiente = paginaActual + cambio;
    if(siguiente < 0 || siguiente >= totalPaginas){
        return;
    }
    paginaActual = siguiente;
    listarGarantias();
}

function actualizarMotivoNoAplica(){
    const noAplica = document.getElementById("estado").value === "No aplico garantia";
    document.getElementById("grupoMotivoNoAplica").style.display = noAplica ? "block" : "none";
    document.getElementById("motivoNoAplicaGarantia").required = noAplica;
}

function limpiarFormulario(){
    document.getElementById("formGarantia").reset();
    document.getElementById("garantiaId").value = "";
    document.getElementById("equipoId").value = "";
    document.getElementById("numeroTicket").value = "";
    document.getElementById("fechaIngresoGarantia").value = new Date().toISOString().slice(0, 10);
    document.getElementById("estado").value = "En tramite";
    actualizarMotivoNoAplica();
}
</script>

</body>
</html>

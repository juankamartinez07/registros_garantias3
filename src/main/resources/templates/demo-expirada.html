<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Demo expirada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#0f172a;
            padding:20px;
        }

        .demo-card{
            width:min(560px, 100%);
            background:white;
            border-radius:10px;
            padding:34px;
            box-shadow:0 24px 60px rgba(0,0,0,0.28);
            text-align:center;
        }

        .demo-card h1{
            color:#b91c1c;
            font-weight:800;
            margin-bottom:16px;
        }

        .demo-card p{
            color:#334155;
            font-size:18px;
            margin-bottom:24px;
        }
    </style>
</head>

<body>

<main class="demo-card">
    <h1>Tu prueba demo ha expirado.</h1>
    <p>
        Tu prueba demo ha expirado. Para continuar utilizando el sistema,
        comunicate con el administrador del sistema.
    </p>
    <form action="/logout" method="post">
        <button type="submit" class="btn btn-danger">
            Cerrar sesion
        </button>
    </form>
</main>

</body>

</html>

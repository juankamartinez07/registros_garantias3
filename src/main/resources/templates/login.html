<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Inventario</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <style>

        body{

            margin:0;
            padding:0;

            height:100vh;

            background-image:
                    url('/img/background.png');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:Arial;

        }


        .login-card{

            width:1000px;
            height:600px;

            background:white;

            border-radius:25px;

            overflow:hidden;

            display:flex;

            box-shadow:
                    0 15px 40px rgba(0,0,0,0.2);

        }


        .left-panel{

            width:45%;

            background:
                    linear-gradient(
                        180deg,
                        #002b73,
                        #0046c0
                    );

            display:flex;

            flex-direction:column;

            justify-content:center;
            align-items:center;

            color:white;

            padding:40px;

        }


        .left-panel img{

            width:220px;

            margin-bottom:30px;

        }


        .left-panel h2{

            font-weight:bold;

            margin-bottom:15px;

        }


        .left-panel p{

            text-align:center;

            opacity:0.9;

            font-size:18px;

        }


        .right-panel{

            width:55%;

            padding:70px;

            display:flex;

            flex-direction:column;

            justify-content:center;

        }


        .titulo{

            font-size:50px;

            font-weight:bold;

            color:#002b73;

            margin-bottom:10px;

        }


        .subtitulo{

            color:gray;

            margin-bottom:40px;

        }


        .form-control{

            height:60px;

            border-radius:12px;

            font-size:18px;

        }


        .input-group-login{

            position:relative;

        }


        .input-icon{

            position:absolute;

            left:18px;
            top:50%;

            transform:translateY(-50%);

            width:24px;
            height:24px;

            object-fit:contain;

            opacity:0.85;

            z-index:2;

        }


        .input-group-login .form-control{

            padding-left:58px;
            padding-right:58px;

        }


        .toggle-password{

            position:absolute;

            right:18px;
            top:50%;

            transform:translateY(-50%);

            width:36px;
            height:36px;

            border:0;
            background:transparent;

            color:#6b7280;

            display:flex;
            align-items:center;
            justify-content:center;

            cursor:pointer;

            border-radius:50%;

            transition:background 0.2s, color 0.2s;

            z-index:2;

        }


        .toggle-password:hover{

            background:#eef4ff;
            color:#0052d4;

        }


        .system-version{

            position:fixed;

            left:24px;
            bottom:18px;

            color:white;

            font-size:14px;
            line-height:1.4;

            opacity:0.9;

            text-shadow:0 1px 4px rgba(0,0,0,0.35);

        }


        .btn-login{

            height:60px;

            border-radius:12px;

            background:#0052d4;

            border:none;

            font-size:22px;

            font-weight:bold;

            transition:0.3s;

        }


        .btn-login:hover{

            background:#003c9e;

            transform:scale(1.02);

        }


        .alert{

            border-radius:12px;

        }


        @media(max-width:900px){

            .login-card{

                width:95%;

                height:auto;

                flex-direction:column;

            }

            .left-panel{

                width:100%;

                height:300px;

            }

            .right-panel{

                width:100%;

                padding:40px;

            }

            .system-version{

                position:static;

                margin:20px;

                color:#1e293b;

                text-shadow:none;

            }

        }

    </style>

</head>

<body>


<div class="login-card">


    <!-- PANEL IZQUIERDO -->

    <div class="left-panel">

        <img src="/img/logo.png">

        <h2>SMD Seguridad Armenia</h2>

        <p>
        <p>

          Sistema de registro, consulta y trazabilidad 
            de seriales para soporte y garantías

        </p>

    </div>



    <!-- PANEL DERECHO -->

    <div class="right-panel">

        <div class="titulo">

            Bienvenido

        </div>

        <div class="subtitulo">

            Inicia sesion para continuar

        </div>


        <!-- ERROR LOGIN -->

        <div th:if="${param.error}"
             class="alert alert-danger">

            Usuario o contraseña incorrectos

        </div>


        <!-- LOGOUT -->

        <div th:if="${param.logout}"
             class="alert alert-success">

            Sesion cerrada correctamente

        </div>


        <!-- FORM LOGIN -->

        <form method="post"
              action="/login">

            <div class="mb-4 input-group-login">

                <img
                    src="/img/user.png"
                    alt=""
                    class="input-icon">

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Usuario">

            </div>


            <div class="mb-4 input-group-login">

                <img
                    src="/img/key.png"
                    alt=""
                    class="input-icon">

                <input type="password"
                       id="password"
                       name="password"
                       class="form-control"
                       placeholder="Contraseña">

                <button
                    type="button"
                    class="toggle-password"
                    onclick="togglePassword()"
                    aria-label="Mostrar u ocultar contraseña">

                    <i id="passwordIcon" class="bi bi-eye"></i>

                </button>

            </div>

            <button class="btn btn-primary btn-login w-100">

                <i class="bi bi-box-arrow-in-right"></i>

                Iniciar sesion

            </button>

        </form>

    </div>

</div>

<div class="system-version">
    Versión 1.0<br>
    © SMD Seguridad 2026
</div>

<script>

    function togglePassword(){

        let input =
            document.getElementById(
                "password"
            );

        if(input.type === "password"){

            input.type = "text";
            document
                .getElementById("passwordIcon")
                .className = "bi bi-eye-slash";

        }else{

            input.type = "password";
            document
                .getElementById("passwordIcon")
                .className = "bi bi-eye";

        }

    }

</script>
</body>

</html>
